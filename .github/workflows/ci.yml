name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace @ownly/web
      - run: npm run lint --workspace @ownly/web
      - run: npm run build --workspace @ownly/web

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e "services/api[dev]"
      - run: ruff check services/api
      - run: mypy --config-file services/api/pyproject.toml services/api/app
      - run: pytest services/api
