services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ownly
      POSTGRES_USER: ownly
      POSTGRES_PASSWORD: ownly
    ports:
      - "5432:5432"
    volumes:
      - ownly_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ownly -d ownly"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ownly
      MINIO_ROOT_PASSWORD: change-me-local-minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ownly_minio:/data

  api:
    build:
      context: ./services/api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  ownly_postgres:
  ownly_minio:
